<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lecturer Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #00b4d8;
            --blue-dark: #0096c7;
            --bg1: #0d1117;
            --glass: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #f0f6fc;
            --muted: rgba(240,246,252,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg1);
            color: var(--text);
            min-height: 100dvh;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background: radial-gradient(ellipse at top right, rgba(0,180,216,0.1) 0%, transparent 60%), var(--bg1);
        }
        .container {
            width: 100%; max-width: 420px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 28px;
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--blue), #48cae4);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin: 0 auto 14px;
            box-shadow: 0 8px 32px rgba(0,180,216,0.25);
        }
        .logo h1 { font-size: 22px; font-weight: 700; }
        .logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }
        .role-badge {
            display: inline-block;
            background: rgba(0,180,216,0.1);
            border: 1px solid rgba(0,180,216,0.2);
            color: var(--blue);
            font-size: 12px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 8px;
            letter-spacing: 0.04em;
        }
        .form-group { margin-bottom: 18px; }
        label { font-size: 11px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
        input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        input:focus { border-color: var(--blue); background: rgba(0,180,216,0.05); }
        input::placeholder { color: rgba(255,255,255,0.2); }
        .btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, var(--blue), #48cae4);
            color: white; border: none;
            border-radius: 12px;
            font-size: 15px; font-weight: 700;
            font-family: inherit; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,180,216,0.3);
            margin-top: 8px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .error {
            background: rgba(233,69,96,0.1);
            border: 1px solid rgba(233,69,96,0.3);
            color: #ff8099;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        .divider { height: 1px; background: var(--border); margin: 22px 0; }
        .link { text-align: center; font-size: 14px; color: var(--muted); }
        .link a { color: var(--blue); text-decoration: none; font-weight: 600; }
        .switch-portal {
            text-align: center; margin-top: 12px;
        }
        .switch-portal a {
            font-size: 13px; color: var(--muted);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">👨‍🏫</div>
            <h1>Lecturer Portal</h1>
            <p>Smart Attendance Management</p>
            <span class="role-badge">STAFF ACCESS</span>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="lecturer@aefunai.edu.ng" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">Login to Portal</button>
        </form>
        <div class="divider"></div>
        <div class="link">
            <p>No account? <a href="/lecturer/register">Register here</a></p>
        </div>
        <div class="switch-portal">
            <a href="/login">🎓 Switch to Student Portal</a>
        </div>
    </div>
</body>
</html>
