<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Attendance - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e94560;
            --red-dark: #c73652;
            --bg1: #0d1117;
            --bg2: #161b22;
            --glass: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #f0f6fc;
            --muted: rgba(240,246,252,0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%;
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg1);
            color: var(--text);
            overflow-x: hidden;
        }
        body {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            background: radial-gradient(ellipse at top left, rgba(233,69,96,0.12) 0%, transparent 60%),
                        radial-gradient(ellipse at bottom right, rgba(15,52,96,0.3) 0%, transparent 60%),
                        var(--bg1);
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 36px 28px;
            backdrop-filter: blur(20px);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--red), #ff6b6b);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 32px rgba(233,69,96,0.3);
        }
        .logo h1 { font-size: 22px; font-weight: 700; color: var(--text); }
        .logo p { font-size: 13px; color: var(--muted); margin-top: 4px; }
        .form-group { margin-bottom: 18px; }
        label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px; /* prevents zoom on iOS */
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            -webkit-appearance: none;
        }
        input:focus { border-color: var(--red); background: rgba(233,69,96,0.06); }
        input::placeholder { color: rgba(255,255,255,0.2); }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--red), #ff6b6b);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(233,69,96,0.35);
            margin-top: 8px;
            letter-spacing: 0.02em;
        }
        .btn:active { transform: scale(0.98); }
        .error {
            background: rgba(233,69,96,0.1);
            border: 1px solid rgba(233,69,96,0.3);
            color: #ff8099;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        .divider { height: 1px; background: var(--border); margin: 24px 0; }
        .link { text-align: center; font-size: 14px; color: var(--muted); }
        .link a { color: var(--red); text-decoration: none; font-weight: 600; }
        .portal-switch {
            text-align: center;
            margin-top: 16px;
        }
        .portal-switch a {
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: inline-block;
            transition: border-color 0.2s;
        }
        .portal-switch a:hover { border-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">🎓</div>
            <h1>Smart Attendance</h1>
            <p>Pattern-Based Attendance System</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>Matric Number</label>
                <input type="text" name="matric_no" placeholder="e.g. AEF/2021/001" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            </div>
            <input type="hidden" name="device_hash" id="device_hash">
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="divider"></div>
        <div class="link">
            <p>No account? <a href="/register">Register here</a></p>
        </div>
        <div class="portal-switch" style="margin-top:12px;">
            <a href="/lecturer/login">👨‍🏫 Switch to Lecturer Portal</a>
        </div>
    </div>
    <script>
        function getDeviceHash() {
            const data = navigator.userAgent + screen.width + screen.height + navigator.language + navigator.platform;
            let hash = 0;
            for (let i = 0; i < data.length; i++) { hash = ((hash << 5) - hash) + data.charCodeAt(i); hash |= 0; }
            return Math.abs(hash).toString(16);
        }
        document.getElementById('device_hash').value = getDeviceHash();
    </script>
</body>
</html>
