<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Attendance - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--red:#e94560;--bg1:#0d1117;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#f0f6fc;--muted:rgba(240,246,252,0.5)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{font-family:'Space Grotesk',sans-serif;background:var(--bg1);color:var(--text)}
        body{min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;background:radial-gradient(ellipse at top left,rgba(233,69,96,0.1) 0%,transparent 60%),var(--bg1)}
        .container{width:100%;max-width:440px;background:var(--glass);border:1px solid var(--border);border-radius:24px;padding:32px 24px}
        .logo{text-align:center;margin-bottom:24px}
        .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--red),#ff6b6b);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px;box-shadow:0 8px 24px rgba(233,69,96,0.3)}
        .logo h1{font-size:20px;font-weight:700}
        .logo p{font-size:13px;color:var(--muted);margin-top:3px}
        .section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin:20px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
        .form-group{margin-bottom:14px}
        label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:7px;letter-spacing:0.04em;text-transform:uppercase}
        input,select{width:100%;padding:13px 15px;background:rgba(255,255,255,0.06);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
        input:focus,select:focus{border-color:var(--red);background:rgba(233,69,96,0.05)}
        input::placeholder{color:rgba(255,255,255,0.2)}
        select option{background:#161b22}
        select:disabled{opacity:0.4;cursor:not-allowed}
        .btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--red),#ff6b6b);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(233,69,96,0.35);margin-top:10px;transition:transform 0.1s}
        .btn:active{transform:scale(0.98)}
        .error{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3);color:#ff8099;padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:center}
        .tip{background:rgba(0,180,216,0.08);border:1px solid rgba(0,180,216,0.15);border-radius:10px;padding:10px 13px;font-size:12px;color:rgba(0,180,216,0.9);margin-bottom:16px;line-height:1.5}
        .divider{height:1px;background:var(--border);margin:20px 0}
        .link{text-align:center;font-size:14px;color:var(--muted)}
        .link a{color:var(--red);text-decoration:none;font-weight:600}
        .level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
        .level-btn{padding:10px 4px;border:2px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;transition:all 0.2s}
        .level-btn.active{border-color:var(--red);background:rgba(233,69,96,0.1);color:var(--red)}
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <div class="logo-icon">🎓</div>
        <h1>Create Account</h1>
        <p>Smart Attendance System</p>
    </div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <div class="tip">📱 Register on the device you'll always use — your account will be locked to this device.</div>
    <form method="POST" id="registerForm">
        <div class="section-title">Personal Information</div>
        <div class="form-group"><label>Full Name</label><input type="text" name="full_name" placeholder="e.g. John Doe" required></div>
        <div class="form-group"><label>Matric Number</label><input type="text" name="matric_no" placeholder="e.g. 2022/SC/25026" required></div>
        <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="john@aefunai.edu.ng" required></div>
        <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Create a strong password" required></div>
        <div class="form-group"><label>Parent/Guardian Phone</label><input type="tel" name="parent_phone" placeholder="e.g. 08012345678" required></div>
        <div class="section-title">Academic Information</div>
        <div class="form-group">
            <label>Faculty</label>
            <select name="faculty_id" id="faculty_select" required onchange="loadDepartments(this.value)">
                <option value="">— Select Faculty —</option>
            </select>
        </div>
        <div class="form-group">
            <label>Department</label>
            <select name="department_id" id="dept_select" required disabled>
                <option value="">— Select Department —</option>
            </select>
        </div>
        <div class="form-group">
            <label>Level</label>
            <div class="level-grid">
                <button type="button" class="level-btn" onclick="setLevel(100,this)">100</button>
                <button type="button" class="level-btn" onclick="setLevel(200,this)">200</button>
                <button type="button" class="level-btn" onclick="setLevel(300,this)">300</button>
                <button type="button" class="level-btn" onclick="setLevel(400,this)">400</button>
                <button type="button" class="level-btn" onclick="setLevel(500,this)">500</button>
            </div>
            <input type="hidden" name="level" id="level-hidden">
        </div>
        <input type="hidden" name="device_hash" id="device_hash">
        <button type="submit" class="btn">Create Account</button>
    </form>
    <div class="divider"></div>
    <div class="link"><p>Already registered? <a href="/login">Login here</a></p></div>
</div>
<script>
    document.getElementById('device_hash').value = (() => {
        const d = navigator.userAgent+screen.width+screen.height+navigator.language+navigator.platform;
        let h = 0; for(let i=0;i<d.length;i++){h=((h<<5)-h)+d.charCodeAt(i);h|=0;} return Math.abs(h).toString(16);
    })();
    fetch('/api/faculties').then(r=>r.json()).then(data=>{
        const sel=document.getElementById('faculty_select');
        data.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.name;sel.appendChild(o);});
    });
    function loadDepartments(fid){
        const sel=document.getElementById('dept_select');
        sel.innerHTML='<option value="">— Select Department —</option>';
        sel.disabled=true;
        if(!fid)return;
        fetch('/api/departments/'+fid).then(r=>r.json()).then(data=>{
            data.forEach(d=>{const o=document.createElement('option');o.value=d.id;o.textContent=d.name;sel.appendChild(o);});
            sel.disabled=false;
        });
    }
    function setLevel(level,btn){
        document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('level-hidden').value=level;
    }
    document.getElementById('registerForm').addEventListener('submit',function(e){
        if(!document.getElementById('level-hidden').value){e.preventDefault();alert('Please select your level');}
    });
</script>
</body>
</html>
