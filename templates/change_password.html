<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Change Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--red:#e94560;--blue:#00b4d8;--green:#2ed573;--bg1:#0d1117;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#f0f6fc;--muted:rgba(240,246,252,0.5)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:'Space Grotesk',sans-serif;background:var(--bg1);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
        .container{width:100%;max-width:420px;background:var(--glass);border:1px solid var(--border);border-radius:24px;padding:36px 28px}
        .logo{text-align:center;margin-bottom:28px}
        .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--red),#ff6b6b);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px}
        .logo h1{font-size:20px;font-weight:700}
        .logo p{font-size:13px;color:var(--muted);margin-top:3px}
        .form-group{margin-bottom:16px}
        label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em}
        input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
        input:focus{border-color:var(--red)}
        input::placeholder{color:rgba(255,255,255,0.2)}
        .btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--red),#ff6b6b);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px;transition:transform 0.1s}
        .btn:active{transform:scale(0.98)}
        .error{background:rgba(233,69,96,0.1);border:1px solid rgba(233,69,96,0.3);color:#ff8099;padding:12px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:center}
        .success{background:rgba(46,213,115,0.1);border:1px solid rgba(46,213,115,0.3);color:var(--green);padding:12px;border-radius:10px;font-size:13px;margin-bottom:16px;text-align:center}
        .back-link{text-align:center;margin-top:16px}
        .back-link a{color:var(--muted);font-size:13px;text-decoration:none}
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <div class="logo-icon">🔒</div>
        <h1>Change Password</h1>
        <p>Update your login password</p>
    </div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if success %}<div class="success">{{ success }}</div>{% endif %}
    <form method="POST">
        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="old_password" placeholder="Enter current password" required>
        </div>
        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" placeholder="Enter new password" required minlength="6">
        </div>
        <button type="submit" class="btn">Update Password</button>
    </form>
    <div class="back-link">
        {% if role == 'lecturer' %}
        <a href="/lecturer/dashboard">← Back to Dashboard</a>
        {% else %}
        <a href="/dashboard">← Back to Dashboard</a>
        {% endif %}
    </div>
</div>
</body>
</html>
